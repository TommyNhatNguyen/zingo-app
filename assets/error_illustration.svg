<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22B9D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="68" cy="182" rx="48" ry="6" fill="#0891B2" fill-opacity="0.12"/>

  <!-- Bubble tail — drawn first so body overlaps the seam -->
  <path d="M 50 140 L 25 172 L 78 140 Z" fill="#0891B2"/>

  <!-- Speech bubble body -->
  <rect x="15" y="20" width="170" height="120" rx="28" fill="url(#bubbleGrad)"/>

  <!-- X mark — centered at (100, 80) -->
  <line x1="74" y1="54" x2="126" y2="106" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="126" y1="54" x2="74" y2="106" stroke="white" stroke-width="12" stroke-linecap="round"/>

  <!-- Error badge top-right (mirrors the recording badge from logo.svg) -->
  <circle cx="168" cy="28" r="16" fill="#FF7043"/>
  <!-- Exclamation stem -->
  <rect x="166.5" y="18.5" width="3" height="9" rx="1.5" fill="white"/>
  <!-- Exclamation dot -->
  <circle cx="168" cy="33.5" r="2.2" fill="white"/>
</svg>
